# Build Windows and macOS installers, then attach them to a GitHub Release when you push a tag v*.
# Manual runs (workflow_dispatch) still build and upload artifacts to the Actions run, but do not create a Release.
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npm run build:win

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: cnvtr-windows
          path: release/*.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npm run build:mac

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: cnvtr-macos
          path: release/*.dmg

  # Publishes installers to https://github.com/lancemakesmusic/CNVTR/releases when a version tag is pushed
  publish-release:
    needs: [build-windows, build-mac]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: cnvtr-windows
          path: win

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: cnvtr-macos
          path: mac

      - name: Create GitHub Release and attach installers
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            win/*.exe
            mac/*.dmg
